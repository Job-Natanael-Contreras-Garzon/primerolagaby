<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Electoral" />
    <meta name="description" content="Aplicación de supervisión electoral con acceso a cámara" />
    <meta name="theme-color" content="#1f2937" />
    <title>Front Electoral</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <!-- Registrar Service Worker para funcionalidad PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js', { scope: '/' })
            .then((registration) => {
              console.log('✅ Service Worker registrado:', registration)
              
              // Escuchar actualizaciones disponibles
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing
                newWorker?.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('📦 Actualización disponible')
                    // Aquí puedes mostrar notificación de actualización
                  }
                })
              })
            })
            .catch((error) => {
              console.warn('⚠️ Error registrando Service Worker:', error)
            })
        })
      } else {
        console.warn('⚠️ Service Worker no soportado en este navegador')
      }
    </script>
  </body>
</html>
